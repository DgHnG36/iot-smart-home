[common_hw]
platform      = espressif32
board         = yolo_uno
framework     = arduino
monitor_speed = 115200
lib_deps      =
    robtillaart/DHT20 @ 0.3.2
    PubSubClient
    Wire
    madhephaestus/ESP32Servo @ 0.13.0
    adafruit/Adafruit NeoPixel
build_flags   =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -I include

[env:yolo_uno]
extends     = common_hw
lib_deps    =
    ${common_hw.lib_deps}
    ArduinoHttpClient
    ArduinoJson
build_flags =
    ${common_hw.build_flags}

[env:native]
platform       = native
test_framework = unity
extra_scripts  = pre:scripts/native_toolchain.py
test_build_src = true
test_filter    =
    test_event_queue
    test_timer_manager
    test_climate_service
    test_light_service
    test_motion_service
    test_command_service
build_flags =
    -I test/mocks
    -I include
build_src_filter =
    -<*>
    +<system/event_queue.cpp>
    +<system/timer_manager.cpp>
    +<services/climate_service.cpp>
    +<services/light_service.cpp>
    +<services/motion_service.cpp>
    +<services/command_service.cpp>

[env:yolo_uno_test]
extends                      = common_hw
test_framework               = unity
test_filter                  =
    test_mqtt_hardware
    test_sensor_hardware
    test_motion_hardware